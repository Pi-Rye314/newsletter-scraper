<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    :root {
      --lst-deep-teal: #1f4f4f;
      --lst-teal: #2c6e6e;
      --lst-sage: #5c7a63;
      --lst-charcoal: #2c2c2c;
      --lst-stone: #e6e2d6;
      --lst-amber: #d68c45;
      --lst-ivory: #f5f1e6;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, var(--lst-stone) 0%, var(--lst-ivory) 100%);
      color: var(--lst-charcoal);
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 680px;
      margin: 32px auto;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(31, 79, 79, 0.18);
      box-shadow: 0 18px 36px rgba(44, 44, 44, 0.16);
    }
    header {
      background: linear-gradient(125deg, var(--lst-deep-teal) 0%, var(--lst-teal) 58%, var(--lst-sage) 100%);
      color: var(--lst-ivory);
      padding: 32px 40px;
      border-bottom: 4px solid var(--lst-amber);
      text-align: center;
    }

    .header-content {
      margin-bottom: 16px;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-bottom: 3px solid var(--lst-amber);
      padding-bottom: 12px;
      display: inline-block;
      line-height: 1.3;
    }

    header p.subtitle {
      margin: 8px 0;
      font-size: 14px;
      font-style: italic;
      color: rgba(245, 241, 230, 0.95);
      font-family: Arial, sans-serif;
    }

    .header-meta {
      margin-top: 16px;
    }

    header p.date {
      margin: 0;
      display: inline-block;
      font-size: 11px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      background: var(--lst-amber);
      padding: 6px 14px;
      border-radius: 4px;
      transition: background-color 120ms ease;
    }

    header p.date:hover {
      background: #c77a33;
    }
    main {
      padding: 32px 40px;
      background: linear-gradient(180deg, #ffffff 0%, #fcfaf4 100%);
      line-height: 1.7;
    }
    .source-group {
      margin-bottom: 36px;
      padding: 16px 18px 12px;
      background: rgba(230, 226, 214, 0.3);
      border-left: 5px solid var(--lst-sage);
      border-radius: 6px;
    }
    .source-group h2 {
      font-size: 12px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--lst-deep-teal);
      border-bottom: 2px solid rgba(31, 79, 79, 0.3);
      padding-bottom: 6px;
      margin: 0 0 16px;
      font-weight: 700;
    }
    .article {
      margin-bottom: 24px;
    }
    .article h3 {
      margin: 0 0 8px;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.4;
    }
    .article h3 a {
      color: var(--lst-deep-teal);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .article h3 a:hover {
      color: var(--lst-teal);
      border-color: rgba(44, 110, 110, 0.4);
    }
    .article p {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--lst-charcoal);
    }
    .article p:last-child {
      margin-bottom: 0;
    }
    .article p strong {
      font-weight: 700;
      color: var(--lst-deep-teal);
    }
    .empty {
      font-size: 15px;
      font-style: italic;
      color: rgba(44, 44, 44, 0.55);
      text-align: center;
      padding: 40px 0;
    }
    footer {
      background: var(--lst-charcoal);
      text-align: center;
      font-size: 12px;
      color: var(--lst-stone);
      padding: 24px 40px;
      font-family: Arial, sans-serif;
      border-top: 4px solid var(--lst-amber);
    }

    .footer-content {
      margin-bottom: 16px;
      color: var(--lst-stone);
    }

    .footer-social {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 16px 0;
    }

    .footer-social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--lst-teal);
      color: var(--lst-ivory);
      border-radius: 50%;
      text-decoration: none;
      transition: background-color 120ms ease;
      font-size: 16px;
    }

    .footer-social a:hover {
      background: var(--lst-deep-teal);
    }

    .footer-button {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 28px;
      background: var(--lst-amber);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      transition: background-color 120ms ease;
      border: none;
      cursor: pointer;
    }

    .footer-button:hover {
      background: #c77a33;
    }

    @media (max-width: 720px) {
      .wrapper {
        margin: 14px;
        border-radius: 6px;
      }

      header,
      main,
      footer {
        padding-left: 20px;
        padding-right: 20px;
      }

      header {
        padding-top: 28px;
        padding-bottom: 20px;
      }

      header h1 {
        font-size: 26px;
      }

      main {
        padding-top: 24px;
        padding-bottom: 24px;
      }

      .footer-social {
        gap: 12px;
      }

      .footer-social a {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      .article h3 {
        font-size: 17px;
      }

      .article p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-content">
        <h1>{{ title }}</h1>
        <p class="subtitle">{{ subtitle }}</p>
      </div>
      <div class="header-meta">
        <p class="date">{{ edition_date }}</p>
      </div>
    </header>
    <main>
      {{ content | safe }}
    </main>
    <footer>
      <div class="footer-content">
        {{ title }} &mdash; {{ edition_date }}
      </div>
      <div class="footer-social">
        <a href="https://www.facebook.com" title="Facebook" aria-label="Facebook">f</a>
        <a href="https://www.twitter.com" title="Twitter" aria-label="Twitter">𝕏</a>
        <a href="https://www.linkedin.com" title="LinkedIn" aria-label="LinkedIn">in</a>
      </div>
      <a href="#" class="footer-button">Learn More</a>
    </footer>
  </div>
</body>
</html>
