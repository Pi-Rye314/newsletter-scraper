<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    :root {
      --lst-deep-teal: #1f4f4f;
      --lst-teal: #2c6e6e;
      --lst-sage: #5c7a63;
      --lst-charcoal: #2c2c2c;
      --lst-stone: #e6e2d6;
      --lst-amber: #d68c45;
      --lst-ivory: #f5f1e6;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, var(--lst-stone) 0%, var(--lst-ivory) 100%);
      color: var(--lst-charcoal);
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 680px;
      margin: 32px auto;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(31, 79, 79, 0.18);
      box-shadow: 0 18px 36px rgba(44, 44, 44, 0.16);
    }
    header {
      background: linear-gradient(125deg, var(--lst-deep-teal) 0%, var(--lst-teal) 58%, var(--lst-sage) 100%);
      color: var(--lst-ivory);
      padding: 32px 40px 24px;
      border-bottom: 4px solid var(--lst-amber);
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.6px;
      /* amber underline accent ties the title to the palette */
      border-bottom: 2px solid var(--lst-amber);
      padding-bottom: 10px;
      display: inline-block;
    }
    header p.subtitle {
      margin: 8px 0 12px;
      font-size: 15px;
      font-style: italic;
      color: var(--lst-stone);
    }
    header p.date {
      margin: 0;
      display: inline-block;
      font-size: 12px;
      font-family: Arial, sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--lst-charcoal);
      background: var(--lst-amber);
      padding: 2px 10px;
      border-radius: 20px;
    }
    main {
      padding: 32px 40px;
      background: linear-gradient(180deg, #ffffff 0%, #fcfaf4 100%);
    }
    .source-group {
      margin-bottom: 34px;
      padding: 14px 16px 8px;
      background: rgba(230, 226, 214, 0.36);
      border-left: 4px solid var(--lst-sage);
      border-radius: 8px;
    }
    .source-group h2 {
      font-size: 13px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--lst-deep-teal);
      border-bottom: 2px solid rgba(31, 79, 79, 0.4);
      padding-bottom: 4px;
      margin: 0 0 16px;
    }
    .article {
      margin-bottom: 20px;
    }
    .article h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .article h3 a {
      color: var(--lst-teal);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .article h3 a:hover {
      color: var(--lst-deep-teal);
      border-color: rgba(31, 79, 79, 0.44);
    }
    .article p {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: var(--lst-charcoal);
    }
    .article p strong {
      font-weight: 700;
      color: var(--lst-deep-teal);
    }
    .empty {
      font-size: 15px;
      font-style: italic;
      color: rgba(44, 44, 44, 0.55);
      text-align: center;
      padding: 40px 0;
    }
    footer {
      background: var(--lst-charcoal);
      text-align: center;
      font-size: 12px;
      color: var(--lst-stone);
      padding: 16px 40px;
      font-family: Arial, sans-serif;
      border-top: 4px solid var(--lst-amber);
    }

    @media (max-width: 720px) {
      .wrapper {
        margin: 14px;
      }

      header,
      main,
      footer {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>{{ title }}</h1>
      <p class="subtitle">{{ subtitle }}</p>
      <p class="date">{{ edition_date }}</p>
    </header>
    <main>
      {{ content | safe }}
    </main>
    <footer>
      {{ title }} &mdash; {{ edition_date }}
    </footer>
  </div>
</body>
</html>
